# heating-brain configuration
# Copy this to /etc/heating-brain/config.yaml and edit for your setup.

# -------------------------------------------------------------------
# Location (for Open-Meteo outdoor temperature)
# -------------------------------------------------------------------
location:
  # Find your coordinates at https://www.openstreetmap.org — right-click "Show address"
  latitude: 51.5074
  longitude: -0.1278
  name: "London"

# -------------------------------------------------------------------
# Weather provider (Open-Meteo is free and keyless)
# -------------------------------------------------------------------
weather:
  provider: open-meteo
  # How often to re-fetch outdoor temp. 10 minutes is plenty.
  poll_interval_seconds: 600

# -------------------------------------------------------------------
# Tado connection
# -------------------------------------------------------------------
tado:
  # Path to persist the OAuth2 refresh token between restarts.
  # First run will print a URL — visit it in a browser to authenticate.
  token_file: /var/lib/heating-brain/tado_refresh_token
  # With Auto-Assist you get 20,000 calls/day.
  # 60s poll = ~1440 calls/day, well within budget.
  poll_interval_seconds: 60
  # Leave null to auto-detect the HEATING zone on first run.
  zone_id: null

# -------------------------------------------------------------------
# Control logic
# -------------------------------------------------------------------
control:
  # When heating is turned ON, Tado is set to this target temperature.
  heat_on_target_celsius: 20.0

  # Minimum time (seconds) between state changes sent to Tado.
  # Prevents rapid-cycling even if conditions flip quickly.
  min_state_change_interval_seconds: 600  # 10 minutes

  # When we turn heating OFF: "off" = hard manual-off overlay,
  # "auto" = clear overlay (returns to Tado's own schedule).
  off_behavior: "off"

  # How long a heating-ON overlay should last.
  # Options: MANUAL (until changed), NEXT_TIME_BLOCK, TIMER
  on_overlay_termination: "MANUAL"
  # Only used when on_overlay_termination == TIMER
  timer_minutes: 120

# -------------------------------------------------------------------
# Schedule — when the controller is ALLOWED to act on temperatures.
# Outside these windows, heating is forced OFF unconditionally.
#
# Times are 24h local. Days: mon, tue, wed, thu, fri, sat, sun
#   (or "all", "weekdays", "weekends")
#
# Four-threshold logic (ALL must be true to change state):
#   Turn ON  when indoor < indoor_on_celsius  AND outdoor < outdoor_on_celsius
#   Turn OFF when indoor > indoor_off_celsius AND outdoor > outdoor_off_celsius
#   Otherwise: hold current state (natural deadband — no rapid cycling).
#
# Tip: set indoor_off > indoor_on and outdoor_off > outdoor_on
#   to create a comfortable deadband (e.g. on@18/15, off@20/17).
# -------------------------------------------------------------------
schedule:
  - name: "Weekday mornings"
    days: weekdays
    start: "06:30"
    end:   "09:00"
    indoor_on_celsius:   18.0   # heat on if indoor < 18 AND outdoor < 15
    outdoor_on_celsius:  15.0
    indoor_off_celsius:  20.0   # heat off if indoor > 20 AND outdoor > 17
    outdoor_off_celsius: 17.0

  - name: "Weekday evenings"
    days: weekdays
    start: "17:30"
    end:   "22:30"
    indoor_on_celsius:   18.0
    outdoor_on_celsius:  15.0
    indoor_off_celsius:  20.0
    outdoor_off_celsius: 17.0

  - name: "Weekend daytime"
    days: weekends
    start: "08:00"
    end:   "22:30"
    indoor_on_celsius:   18.0
    outdoor_on_celsius:  14.0
    indoor_off_celsius:  21.0
    outdoor_off_celsius: 16.0

# Outside every window above, heating is forced OFF.

# -------------------------------------------------------------------
# HTTP API and web UI
# -------------------------------------------------------------------
http:
  host: "0.0.0.0"  # bind to all interfaces so other devices on the LAN can reach it
  port: 8423

  # 4-digit PIN for the mobile web UI (string, e.g. "1234").
  # If not set or left blank, the web UI is accessible without a PIN.
  # The PIN only protects the browser UI — /sensor uses its own token below.
  pin: ""

  # How long a manual override (Force ON / Force OFF) lasts before
  # auto-resuming normal schedule logic. Set to 0 to keep indefinitely.
  override_expiry_minutes: 120

# -------------------------------------------------------------------
# Indoor sensor (optional — ESP32 posting to /sensor)
# -------------------------------------------------------------------
# If enabled: a fresh ESP32 reading takes priority over Tado's built-in
# indoor sensor for decision-making. If disabled (or no fresh reading),
# Tado's own insideTemperature reading is used automatically.
sensor:
  enabled: false
  # Reject sensor readings older than this many seconds.
  max_age_seconds: 600
  # Optional shared secret. If set, ESP32 must send X-Sensor-Token header.
  # token: "change-me"

# -------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------
logging:
  level: INFO   # DEBUG, INFO, WARNING, ERROR
  file: /var/log/heating-brain/heating-brain.log
